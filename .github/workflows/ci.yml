name: Docker Build & Push (Node.js 24)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5   # 升级到 v5 → Node.js 24

      - name: Login to Docker Hub
        uses: docker/login-action@v4  # 升级到 v4 → Node.js 24
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6  # 升级到 v6 → Node.js 24
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/hello-cicd:latest

      - name: Run the container
        run: |
          docker run ${{ secrets.DOCKER_HUB_USERNAME }}/hello-cicd:latest