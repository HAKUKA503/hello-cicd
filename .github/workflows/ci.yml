name: Docker Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/hello-cicd:latest

      - name: Run the container to verify
        run: |
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/hello-cicd:latest
          docker run ${{ secrets.DOCKER_HUB_USERNAME }}/hello-cicd:latest